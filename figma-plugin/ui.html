<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Figma to Ozon</title>
    <style>
      :root {
        --bg: #f3f6ff;
        --panel: #ffffff;
        --text: #1a2240;
        --muted: #627094;
        --muted-strong: #4f5d82;
        --border: #d8e1f5;
        --shadow: 0 10px 24px rgba(46, 91, 218, 0.1);

        --primary: #2e5bda;
        --primary-soft: #eaf0ff;
        --primary-soft-strong: #d8e3ff;
        --primary-contrast: #ffffff;

        --info-soft: #eaf0ff;
        --info-text: #3654a6;

        --ok: #13855f;
        --ok-soft: #e8f7f0;
        --ok-soft-strong: #d8f0e5;
        --ok-border: #a8dbc4;

        --warn: #8a5a0a;
        --warn-soft: #fff4df;
        --warn-border: #efd7a7;

        --danger: #b53a2f;
        --danger-soft: #fdecea;
        --danger-soft-strong: #fff5f3;
        --danger-border: #efb9b3;

        --progress-track: #e7edf8;
        --progress-primary-from: #6f95ff;
        --progress-primary-to: #2e5bda;
        --progress-success-from: #54c18f;
        --progress-success-to: #13855f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Manrope", "Segoe UI", sans-serif;
        color: var(--text);
        background: var(--bg);
      }

      .layout {
        display: grid;
        gap: 12px;
        padding: 14px;
      }

      .topbar {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 14px;
        box-shadow: var(--shadow);
        padding: 10px 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .topbar-actions {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .icon-btn {
        width: 34px;
        height: 34px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #fff;
        color: var(--primary);
        padding: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .icon-btn svg {
        width: 18px;
        height: 18px;
        display: block;
      }

      .brand-title {
        margin: 0;
        font-size: 15px;
        font-weight: 800;
      }

      .brand-subtitle {
        margin: 2px 0 0;
        font-size: 12px;
        color: var(--muted);
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 14px;
        box-shadow: var(--shadow);
        padding: 12px;
      }

      .control-grid {
        display: grid;
        gap: 8px;
      }

      .settings-panel {
        display: none;
      }

      .settings-panel.open {
        display: grid;
      }

      .field-label {
        font-size: 11px;
        color: var(--muted);
        margin-bottom: 4px;
      }

      input[type="text"] {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 13px;
        background: #fff;
      }

      select {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 13px;
        background: #fff;
      }

      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .actions-row {
        margin-top: 0;
        margin-bottom: 0;
      }

      button {
        border: 1px solid transparent;
        border-radius: 10px;
        padding: 9px 12px;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
        background: #fff;
        color: var(--text);
      }

      button.primary {
        background: var(--primary);
        color: var(--primary-contrast);
        border-color: var(--primary);
      }

      button.danger {
        background: var(--danger-soft);
        color: var(--danger);
        border-color: var(--danger-border);
      }

      button.outline {
        border-color: var(--border);
        color: var(--primary);
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .checkbox-row {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      .check {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: var(--muted);
      }

      .toggle-setting {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        color: var(--text);
        user-select: none;
      }

      .toggle-setting input {
        position: absolute;
        opacity: 0;
        width: 0;
        height: 0;
      }

      .toggle-ui {
        width: 38px;
        height: 22px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: #fff;
        position: relative;
        transition: background-color 0.2s ease, border-color 0.2s ease;
      }

      .toggle-ui::after {
        content: "";
        position: absolute;
        top: 2px;
        left: 2px;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: var(--primary);
        transition: transform 0.2s ease;
      }

      .toggle-setting input:checked + .toggle-ui {
        background: var(--primary-soft);
        border-color: var(--primary-soft-strong);
      }

      .toggle-setting input:checked + .toggle-ui::after {
        transform: translateX(16px);
      }

      .summary {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      .pill {
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 8px 10px;
        background: #fff;
      }

      .pill-value {
        font-size: 15px;
        font-weight: 800;
      }

      .pill-label {
        font-size: 11px;
        color: var(--muted);
      }

      .progress {
        border: 1px solid var(--border);
        border-radius: 12px;
        background: #ffffff;
        padding: 10px;
      }

      .progress.progress-idle {
        min-height: 46px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
      }

      .progress.progress-idle .progress-text {
        margin: 0;
      }

      .progress-text {
        font-size: 12px;
        color: var(--text);
        margin-bottom: 6px;
      }

      .progress-bar {
        width: 100%;
        height: 8px;
        border-radius: 999px;
        background: var(--progress-track);
        overflow: hidden;
      }

      .progress-fill {
        height: 100%;
        border-radius: 999px;
        background: linear-gradient(90deg, var(--progress-primary-from), var(--progress-primary-to));
        transition: width 0.2s ease;
      }

      .progress-fill.success {
        background: linear-gradient(90deg, var(--progress-success-from), var(--progress-success-to));
      }

      .warnings {
        border-radius: 12px;
        border: 1px solid var(--warn-border);
        background: var(--warn-soft);
        color: var(--warn);
        padding: 10px 12px;
        font-size: 12px;
        white-space: pre-line;
      }

      .groups {
        display: grid;
        gap: 12px;
      }

      .group-card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 14px;
        overflow: hidden;
        box-shadow: var(--shadow);
      }

      .group-card.synced-success {
        border-color: var(--ok-border);
        background: linear-gradient(180deg, var(--ok-soft) 0%, var(--panel) 40%);
        box-shadow: 0 0 0 1px var(--ok-soft-strong), 0 10px 24px rgba(19, 133, 95, 0.14);
      }

      .group-card.synced-success .group-head {
        background: var(--ok-soft);
        border-bottom-color: var(--ok-border);
      }

      .group-card.lookup-error,
      .group-card.not-found {
        border-color: var(--danger-border);
        background: linear-gradient(180deg, var(--danger-soft-strong) 0%, var(--panel) 40%);
        box-shadow: 0 0 0 1px var(--danger-border), 0 10px 24px rgba(181, 58, 47, 0.12);
      }

      .group-card.lookup-error .group-head,
      .group-card.not-found .group-head {
        background: var(--danger-soft-strong);
        border-bottom-color: var(--danger-border);
      }

      .group-head {
        padding: 10px 12px;
        border-bottom: 1px solid var(--border);
        background: #fff;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
      }

      .product-name {
        font-size: 14px;
        font-weight: 800;
      }

      .offer-id {
        font-size: 11px;
        color: var(--muted);
      }

      .meta {
        font-size: 11px;
        color: var(--muted);
      }

      .status {
        align-self: start;
        border-radius: 999px;
        padding: 4px 8px;
        font-size: 11px;
        font-weight: 700;
        background: var(--info-soft);
        color: var(--info-text);
      }

      .status.warn {
        background: var(--warn-soft);
        color: var(--warn);
      }

      .status.err {
        background: var(--danger-soft);
        color: var(--danger);
      }

      .status.lookup-error {
        background: var(--danger-soft);
        color: var(--danger);
      }

      .status.not-found {
        background: var(--danger-soft);
        color: var(--danger);
      }

      .group-body {
        padding: 12px;
        display: grid;
        gap: 10px;
      }

      .group-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .product-line {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 10px;
        font-size: 12px;
      }

      .tag {
        border-radius: 999px;
        padding: 4px 10px;
        font-size: 11px;
        font-weight: 700;
        background: var(--primary-soft);
        color: var(--primary);
      }

      .items {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 6px;
      }

      .item {
        display: grid;
        grid-template-columns: 72px 1fr;
        grid-template-rows: auto auto;
        gap: 6px;
        align-items: stretch;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 6px;
        background: #fff;
        cursor: grab;
      }

      .item.dragging {
        opacity: 0.45;
      }

      .item:active {
        cursor: grabbing;
      }

      .item.drop-target {
        outline: 2px dashed var(--primary);
      }

      .thumb {
        grid-column: 1;
        grid-row: 1 / span 2;
        width: 72px;
        aspect-ratio: 3 / 4;
        height: auto;
        border-radius: 8px;
        border: 1px solid var(--border);
        object-fit: contain;
        object-position: center;
        background: transparent;
        align-self: start;
      }

      .item-body {
        grid-column: 2;
        grid-row: 1;
        min-width: 0;
      }

      .item-topline {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 6px;
        margin-bottom: 3px;
      }

      .item-top-left {
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }

      .item-order {
        font-size: 11px;
        font-weight: 800;
        color: var(--text);
      }

      .item-title {
        font-size: 10px;
        font-weight: 600;
        color: var(--muted);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .item-type {
        display: inline-flex;
        border-radius: 999px;
        padding: 2px 8px;
        font-size: 9px;
        font-weight: 700;
        border: 1px solid var(--border);
      }

      .item-type.new {
        border-color: var(--primary-soft-strong);
        background: var(--primary-soft);
        color: var(--primary);
      }

      .item-type.existing {
        border-color: var(--ok-border);
        background: var(--ok-soft);
        color: var(--ok);
      }

      .item-actions {
        grid-column: 2;
        grid-row: 2;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 6px;
        border-top: 1px solid var(--border);
        margin-top: 2px;
        padding-top: 6px;
      }

      .item-actions button {
        min-width: 34px;
        padding: 5px 7px;
      }

      .drag-handle {
        width: 18px;
        text-align: center;
        color: var(--muted-strong);
        font-size: 12px;
        line-height: 1;
      }

      .result {
        font-size: 12px;
        color: var(--muted);
        border-top: 1px solid var(--border);
        padding-top: 8px;
      }

      .result.result-error {
        color: var(--danger);
        background: var(--danger-soft-strong);
        border: 1px solid var(--danger-border);
        border-top: 1px solid var(--danger-border);
        border-radius: 10px;
        padding: 10px 12px;
        font-weight: 700;
      }

      .group-logs {
        margin-top: 2px;
      }

      .group-logs summary {
        cursor: pointer;
        list-style: none;
        padding: 2px 0;
        font-size: 10px;
        font-weight: 400;
        color: var(--muted);
        opacity: 0.72;
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 6px;
      }

      .group-logs summary::after {
        content: "▾";
        color: inherit;
        font-size: 10px;
        line-height: 1;
        transition: transform 0.16s ease;
      }

      .group-logs[open] summary::after {
        transform: rotate(180deg);
      }

      .group-logs summary::-webkit-details-marker {
        display: none;
      }

      .group-logs-text {
        margin: 0;
        color: var(--muted);
        opacity: 0.72;
        font-family: "Manrope", "Segoe UI", sans-serif;
        font-size: 10px;
        line-height: 1.45;
        padding: 4px 0 0;
        max-height: 120px;
        overflow: auto;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .empty {
        border: 1px dashed var(--border);
        border-radius: 12px;
        padding: 14px;
        color: var(--muted);
        font-size: 13px;
        background: #fff;
      }

      .debug-panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 14px;
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .debug-panel summary {
        cursor: pointer;
        list-style: none;
        padding: 10px 12px;
        font-size: 12px;
        font-weight: 700;
        border-bottom: 1px solid var(--border);
        background: #ffffff;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .debug-panel summary::after {
        content: "▾";
        color: var(--primary);
        font-size: 12px;
        line-height: 1;
        transition: transform 0.16s ease;
      }

      .debug-panel[open] summary::after {
        transform: rotate(180deg);
      }

      .debug-panel summary::-webkit-details-marker {
        display: none;
      }

      .debug-body {
        padding: 10px 12px;
        display: grid;
        gap: 8px;
      }

      .debug-actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
      }

      .debug-actions button {
        padding: 6px 10px;
        font-size: 11px;
      }

      .debug-log {
        margin: 0;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: #0f172a;
        color: #dbeafe;
        font-family: "JetBrains Mono", "Fira Code", "Consolas", monospace;
        font-size: 11px;
        line-height: 1.45;
        padding: 10px;
        max-height: 220px;
        overflow: auto;
        white-space: pre-wrap;
        word-break: break-word;
      }

      @media (max-width: 760px) {
        .summary {
          grid-template-columns: 1fr;
        }

        .items {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <div class="topbar">
        <div>
          <h1 class="brand-title">Figma to Ozon Photos</h1>
          <p class="brand-subtitle">Экспорт фото на Ozon</p>
        </div>
        <div class="topbar-actions">
          <button id="toggle-settings" class="icon-btn" title="Настройки" aria-label="Настройки">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3.2"></circle>
              <path d="M19.4 15a1 1 0 0 0 .2 1.1l.1.1a2 2 0 0 1 0 2.8 2 2 0 0 1-2.8 0l-.1-.1a1 1 0 0 0-1.1-.2 1 1 0 0 0-.6.9V20a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.2a1 1 0 0 0-.6-.9 1 1 0 0 0-1.1.2l-.1.1a2 2 0 0 1-2.8 0 2 2 0 0 1 0-2.8l.1-.1a1 1 0 0 0 .2-1.1 1 1 0 0 0-.9-.6H4a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.2a1 1 0 0 0 .9-.6 1 1 0 0 0-.2-1.1l-.1-.1a2 2 0 0 1 0-2.8 2 2 0 0 1 2.8 0l.1.1a1 1 0 0 0 1.1.2h.1a1 1 0 0 0 .5-.9V4a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.2a1 1 0 0 0 .6.9 1 1 0 0 0 1.1-.2l.1-.1a2 2 0 0 1 2.8 0 2 2 0 0 1 0 2.8l-.1.1a1 1 0 0 0-.2 1.1v.1a1 1 0 0 0 .9.5H20a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.2a1 1 0 0 0-.9.6z"></path>
            </svg>
          </button>
          <button id="close-plugin" class="danger">Закрыть</button>
        </div>
      </div>

      <div class="panel control-grid settings-panel" id="settings-panel">
        <div>
          <div class="field-label">Backend URL</div>
          <input id="backend-url" type="text" value="http://localhost:8000" />
        </div>

        <div>
          <div class="field-label">Новые фото по умолчанию</div>
          <label class="toggle-setting" for="new-images-at-start">
            <input id="new-images-at-start" type="checkbox" checked />
            <span class="toggle-ui" aria-hidden="true"></span>
            <span id="new-images-position-label">Добавлять в начало</span>
          </label>
        </div>

        <div class="checkbox-row">
          <label class="check">
            <input id="wait-import-status" type="checkbox" />
            Ждать статус импорта Ozon (медленнее)
          </label>
          <label class="check">
            <input id="verify-apply" type="checkbox" />
            Проверять, что фото применились (медленнее)
          </label>
        </div>
      </div>

      <div class="panel">
        <div class="row actions-row">
          <button id="reload-selection" class="outline">Обновить выделение</button>
          <button id="lookup-all" class="outline">Перезапустить поиск</button>
          <button id="remove-all-existing" class="danger">Удалить все текущие фото</button>
          <button id="sync-all" class="primary">Отправить все фото на Ozon</button>
        </div>
      </div>

      <div class="summary" id="summary"></div>
      <div id="progress"></div>
      <div id="warnings"></div>
      <div class="groups" id="groups"></div>
      <details class="debug-panel" id="debug-panel">
        <summary>Диагностика и логи</summary>
        <div class="debug-body">
          <div class="debug-actions">
            <button id="copy-logs">Копировать</button>
            <button id="clear-logs">Очистить</button>
          </div>
          <pre id="debug-log" class="debug-log">Логи появятся после запуска сценария.</pre>
        </div>
      </details>
    </div>

    <script>
      const NEW_IMAGE_PLACEHOLDER =
        "data:image/svg+xml;utf8," +
        encodeURIComponent(
          `<svg xmlns='http://www.w3.org/2000/svg' width='90' height='120' viewBox='0 0 90 120'>
            <rect width='90' height='120' rx='10' fill='#eef2ff'/>
            <rect x='12' y='16' width='66' height='88' rx='8' fill='#d9e4ff'/>
            <circle cx='33' cy='38' r='7' fill='#b8ccff'/>
            <path d='M18 88l17-20 11 13 9-10 17 17H18z' fill='#92b0ff'/>
          </svg>`
        );

      const state = {
        backendUrl: "http://localhost:8000",
        warnings: [],
        groups: new Map(),
        newImagePreviews: new Map(),
        debugLogs: [],
        newImagesPosition: "start",
        waitImportStatus: false,
        verifyApply: false,
        dragState: null,
        lookupGeneration: 0,
        progress: {
          bulkSyncRunning: false,
          bulkSyncTotal: 0,
          bulkSyncDone: 0,
          bulkSyncOfferId: "",
          lookupRunning: false,
          lookupTotal: 0,
          lookupDone: 0,
          previewRunning: false,
          previewRequestId: "",
          previewTotal: 0,
          previewDone: 0,
          exportRunning: false,
          exportRequestId: "",
          exportOfferId: "",
          exportTotal: 0,
          exportDone: 0,
        },
      };

      const pendingExportRequests = new Map();
      const pendingPreviewRequests = new Map();
      let exportRequestCounter = 0;

      function normalizeBackendUrl(url) {
        return String(url || "").trim().replace(/\/+$/, "");
      }

      function makeProxyUrl(rawUrl) {
        const backendUrl = normalizeBackendUrl(state.backendUrl);
        const target = String(rawUrl || "").trim();
        if (!backendUrl || !target) {
          return target;
        }
        return `${backendUrl}/api/image-proxy?url=${encodeURIComponent(target)}`;
      }

      function escapeHtml(value) {
        return String(value || "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll("\"", "&quot;")
          .replaceAll("'", "&#39;");
      }

      function nowIsoTime() {
        const now = new Date();
        return now.toISOString().slice(11, 23);
      }

      function toLogMetaText(meta) {
        if (meta == null) {
          return "";
        }
        if (typeof meta === "string") {
          return meta;
        }
        try {
          return JSON.stringify(meta);
        } catch {
          return String(meta);
        }
      }

      function logEvent(stage, message, meta = null, level = "info") {
        const line = `[${nowIsoTime()}] [${level.toUpperCase()}] [${stage}] ${message}${
          meta == null ? "" : ` | ${toLogMetaText(meta)}`
        }`;
        state.debugLogs.push(line);
        if (state.debugLogs.length > 800) {
          state.debugLogs = state.debugLogs.slice(state.debugLogs.length - 800);
        }
        renderDebugLog();
      }

      function renderDebugLog() {
        const box = document.getElementById("debug-log");
        if (!box) {
          return;
        }
        if (!state.debugLogs.length) {
          box.textContent = "Логи появятся после запуска сценария.";
          return;
        }
        box.textContent = state.debugLogs.join("\n");
        box.scrollTop = box.scrollHeight;
      }

      function pendingTimeoutLabel(kind) {
        if (kind === "preview") {
          return "Таймаут генерации превью";
        }
        if (kind === "export") {
          return "Таймаут экспорта изображений из Figma";
        }
        return "Таймаут операции";
      }

      function armPendingTimeout(pendingMap, requestId) {
        const pending = pendingMap.get(requestId);
        if (!pending) {
          return;
        }
        if (pending.timeout) {
          clearTimeout(pending.timeout);
        }
        pending.timeout = setTimeout(() => {
          pendingMap.delete(requestId);
          if (typeof pending.onTimeout === "function") {
            pending.onTimeout();
          }
          const message = pendingTimeoutLabel(pending.kind);
          logEvent(pending.kind || "request", message, { requestId, timeoutMs: pending.timeoutMs }, "error");
          pending.reject(new Error(message));
        }, pending.timeoutMs);
      }

      function requestSelection() {
        logEvent("selection", "Запрос выделения из code.js");
        parent.postMessage({ pluginMessage: { type: "request-selection" } }, "*");
      }

      function notify(message, error = false) {
        logEvent("notify", String(message || ""), null, error ? "error" : "info");
        parent.postMessage(
          {
            pluginMessage: {
              type: "notify",
              message,
              error,
            },
          },
          "*"
        );
      }

      function closePlugin() {
        logEvent("plugin", "Закрытие плагина");
        parent.postMessage({ pluginMessage: { type: "close" } }, "*");
      }

      function getOrCreateGroup(offerId) {
        if (!state.groups.has(offerId)) {
          state.groups.set(offerId, {
            offerId,
            product: null,
            items: [],
            newImages: new Map(),
            loadingLookup: false,
            loadingSync: false,
            resultMessage: "",
            status: "draft",
            logs: [],
          });
        }
        return state.groups.get(offerId);
      }

      function hydrateFromSelection(images, warnings) {
        state.lookupGeneration += 1;
        state.groups = new Map();
        state.newImagePreviews = new Map();
        state.warnings = Array.isArray(warnings) ? warnings : [];
        logEvent("selection", "Получены данные выделения", {
          images: Array.isArray(images) ? images.length : 0,
          warnings: state.warnings.length,
        });

        for (const image of images || []) {
          const offerId = String(image.offerId || "").trim();
          if (!offerId) {
            continue;
          }

          const group = getOrCreateGroup(offerId);
          const localId = `${offerId}:${image.localId}:${image.sequence}`;
          const inlineBase64 =
            typeof image.contentBase64 === "string" && image.contentBase64.trim()
              ? image.contentBase64.trim()
              : typeof image.content_base64 === "string" && image.content_base64.trim()
              ? image.content_base64.trim()
              : "";

          group.newImages.set(localId, {
            localId,
            nodeId: image.nodeId || image.localId,
            sourceName: image.sourceName,
            filename: image.filename,
            mimeType: image.mimeType || "image/png",
            sequence: Number(image.sequence) || 1,
            inlineBase64,
          });

          if (inlineBase64) {
            const mimeType = image.mimeType || "image/png";
            state.newImagePreviews.set(localId, `data:${mimeType};base64,${inlineBase64}`);
          }
        }

        for (const group of state.groups.values()) {
          const sorted = [...group.newImages.values()].sort((a, b) => a.sequence - b.sequence);
          group.items = sorted.map((item, index) => ({
            id: `new:${item.localId}:${index}`,
            kind: "new",
            newImageId: item.localId,
          }));
        }

        logEvent("selection", "Сгруппированы изображения по offer_id", {
          groups: state.groups.size,
        });

        render();
        void requestPreviewImagesForSelection();
        void autoLookupGroups();
      }

      async function apiRequest(path, payload) {
        const backendUrl = normalizeBackendUrl(state.backendUrl);
        if (!backendUrl) {
          throw new Error("Укажите URL backend");
        }

        const startedAt = Date.now();
        logEvent("api", "POST request", { path });

        const response = await fetch(`${backendUrl}${path}`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify(payload),
        });

        let data = null;
        try {
          data = await response.json();
        } catch {
          data = null;
        }

        if (!response.ok) {
          const detail = data && data.detail ? data.detail : `HTTP ${response.status}`;
          logEvent(
            "api",
            "Ответ с ошибкой",
            { path, status: response.status, elapsedMs: Date.now() - startedAt, detail: String(detail) },
            "error"
          );
          throw new Error(String(detail));
        }

        logEvent("api", "Успешный ответ", {
          path,
          status: response.status,
          elapsedMs: Date.now() - startedAt,
        });

        return data;
      }

      function reorderGroupByNewImagesPosition(group) {
        if (!group || !Array.isArray(group.items) || !group.items.length) {
          return;
        }

        const newItems = [];
        const existingItems = [];
        const otherItems = [];

        for (const item of group.items) {
          if (item.kind === "new") {
            newItems.push(item);
            continue;
          }
          if (item.kind === "existing") {
            existingItems.push(item);
            continue;
          }
          otherItems.push(item);
        }

        const ordered =
          state.newImagesPosition === "start"
            ? [...newItems, ...existingItems, ...otherItems]
            : [...existingItems, ...newItems, ...otherItems];
        group.items = ordered;
      }

      function applyNewImagesPositionToAllGroups() {
        for (const group of state.groups.values()) {
          reorderGroupByNewImagesPosition(group);
        }
        render();
      }

      function isNotFoundLookupError(message) {
        const normalized = String(message || "").toLowerCase();
        const patterns = [
          "не найден",
          "не найдено",
          "не найдена",
          "не существует",
          "не удалось найти",
          "not found",
          "does not exist",
          "doesn't exist",
          "no such",
          "no product",
          "http 404",
        ];
        return patterns.some((pattern) => normalized.includes(pattern));
      }

      function addGroupLog(group, summary, details = {}) {
        if (!group) {
          return;
        }

        if (!Array.isArray(group.logs)) {
          group.logs = [];
        }

        group.logs.unshift({
          at: new Date().toISOString(),
          summary: String(summary || "Событие"),
          details: details && typeof details === "object" ? details : { value: details ?? null },
        });

        if (group.logs.length > 30) {
          group.logs = group.logs.slice(0, 30);
        }
      }

      async function lookupGroup(offerId, options = {}) {
        const group = state.groups.get(offerId);
        if (!group || group.loadingLookup || group.loadingSync) {
          return false;
        }

        const showSuccessToast = Boolean(options.showSuccessToast);
        const notifyErrors = options.notifyErrors !== false;

        group.loadingLookup = true;
        group.status = "loading";
        group.resultMessage = "Ищем товар и фото в Ozon...";
        logEvent("lookup", "Старт поиска товара", { offerId });
        render();

        try {
          const data = await apiRequest("/api/products/lookup", { offer_id: offerId });
          group.product = data;

          const newItems = group.items.filter((item) => item.kind === "new");
          const existingItems = (data.current_images || []).map((url, index) => ({
            id: `existing:${index}:${url}`,
            kind: "existing",
            url,
          }));
          group.items = [...existingItems, ...newItems];
          reorderGroupByNewImagesPosition(group);

          group.resultMessage = `Товар найден. Проверьте порядок и нажмите «Отправить». Фото в Ozon: ${(data.current_images || []).length}`;
          group.status = "found";

          if (showSuccessToast) {
            notify(`Товар ${offerId} найден`);
          }

          logEvent("lookup", "Товар найден", {
            offerId,
            productId: data.product_id,
            images: (data.current_images || []).length,
          });

          return true;
        } catch (error) {
          const errorText = String(error.message || error);
          const notFound = isNotFoundLookupError(errorText);
          group.resultMessage = notFound ? `Товар не найден: ${errorText}` : `Ошибка поиска: ${errorText}`;
          group.status = notFound ? "not-found" : "lookup-error";
          logEvent("lookup", "Ошибка поиска", { offerId, error: errorText, notFound }, "error");
          if (notifyErrors) {
            notify(group.resultMessage, true);
          }
          return false;
        } finally {
          group.loadingLookup = false;
          render();
        }
      }

      async function runLookupForOffers(offerIds, options = {}) {
        const generation = ++state.lookupGeneration;
        const ids = [...offerIds];

        state.progress.lookupRunning = true;
        state.progress.lookupTotal = ids.length;
        state.progress.lookupDone = 0;
        render();

        if (!ids.length) {
          state.progress.lookupRunning = false;
          render();
          return;
        }

        let nextIndex = 0;
        const concurrency = Math.min(3, ids.length);

        async function worker() {
          while (generation === state.lookupGeneration) {
            const currentIndex = nextIndex;
            nextIndex += 1;
            if (currentIndex >= ids.length) {
              return;
            }

            const offerId = ids[currentIndex];
            await lookupGroup(offerId, options);

            if (generation !== state.lookupGeneration) {
              return;
            }

            state.progress.lookupDone += 1;
            render();
          }
        }

        await Promise.all(Array.from({ length: concurrency }, () => worker()));

        if (generation === state.lookupGeneration) {
          state.progress.lookupRunning = false;
          render();
        }
      }

      async function autoLookupGroups() {
        const offers = [...state.groups.keys()];
        logEvent("lookup", "Автопоиск товаров запущен", { offers: offers.length });
        await runLookupForOffers(offers, { showSuccessToast: false, notifyErrors: false });
      }

      async function lookupAllGroups() {
        const offers = [...state.groups.keys()];
        logEvent("lookup", "Ручной перезапуск поиска", { offers: offers.length });
        await runLookupForOffers(offers, { showSuccessToast: false, notifyErrors: true });
      }

      function requestPreviewImages(items) {
        const requestId = `preview_${Date.now()}_${++exportRequestCounter}`;
        const timeoutMs = Math.max(600000, items.length * 120000);
        state.progress.previewRunning = true;
        state.progress.previewRequestId = requestId;
        state.progress.previewTotal = items.length;
        state.progress.previewDone = 0;
        logEvent("preview", "Старт генерации превью", { requestId, count: items.length, timeoutMs });
        render();

        return new Promise((resolve, reject) => {
          pendingPreviewRequests.set(requestId, {
            resolve,
            reject,
            timeout: null,
            timeoutMs,
            kind: "preview",
            previews: [],
            errors: [],
            onTimeout: () => {
              state.progress.previewRunning = false;
              state.progress.previewRequestId = "";
              render();
            },
          });
          armPendingTimeout(pendingPreviewRequests, requestId);
          parent.postMessage(
            {
              pluginMessage: {
                type: "request-previews",
                requestId,
                items,
              },
            },
            "*"
          );
        });
      }

      async function requestPreviewImagesForSelection() {
        const tasks = [];

        for (const group of state.groups.values()) {
          for (const image of group.newImages.values()) {
            if (image.inlineBase64) {
              continue;
            }
            tasks.push({
              localId: image.localId,
              nodeId: image.nodeId,
            });
          }
        }

        if (!tasks.length) {
          logEvent("preview", "Превью не требуется: все новые изображения уже имеют inline base64");
          return;
        }

        try {
          const result = await requestPreviewImages(tasks);
          const previews = Array.isArray(result?.previews) ? result.previews : [];
          const errors = Array.isArray(result?.errors) ? result.errors : [];

          for (const preview of previews) {
            if (!preview || typeof preview.localId !== "string") {
              continue;
            }
            if (typeof preview.dataUrl !== "string" || !preview.dataUrl) {
              continue;
            }
            state.newImagePreviews.set(preview.localId, preview.dataUrl);
          }

          if (errors.length) {
            appendWarnings(errors.map((error) => `Preview: ${String(error)}`));
          }
          logEvent("preview", "Генерация превью завершена", {
            requested: tasks.length,
            received: previews.length,
            errors: errors.length,
          });
          render();
        } catch (error) {
          console.warn("Preview generation failed:", error);
          appendWarnings([`Preview: ${String(error.message || error)}`]);
          logEvent("preview", "Ошибка генерации превью", { error: String(error.message || error) }, "error");
          renderWarnings();
        } finally {
          state.progress.previewRunning = false;
          state.progress.previewRequestId = "";
          render();
        }
      }

      function requestExportImages(items, offerId) {
        const requestId = `export_${Date.now()}_${++exportRequestCounter}`;
        const timeoutMs = Math.max(1200000, items.length * 240000);
        state.progress.exportRunning = true;
        state.progress.exportRequestId = requestId;
        state.progress.exportOfferId = offerId;
        state.progress.exportTotal = items.length;
        state.progress.exportDone = 0;
        logEvent("export", "Старт экспорта изображений из Figma", {
          requestId,
          offerId,
          count: items.length,
          timeoutMs,
        });
        render();

        return new Promise((resolve, reject) => {
          pendingExportRequests.set(requestId, {
            resolve,
            reject,
            timeout: null,
            timeoutMs,
            kind: "export",
            images: [],
            errors: [],
            onTimeout: () => {
              state.progress.exportRunning = false;
              state.progress.exportRequestId = "";
              render();
            },
          });
          armPendingTimeout(pendingExportRequests, requestId);

          parent.postMessage(
            {
              pluginMessage: {
                type: "export-images",
                requestId,
                items,
              },
            },
            "*"
          );
        });
      }

      async function buildPayloadItems(group) {
        const exportTasks = [];

        for (const item of group.items) {
          if (item.kind !== "new") {
            continue;
          }
          const image = group.newImages.get(item.newImageId);
          if (!image) {
            continue;
          }
          exportTasks.push({
            localId: item.newImageId,
            nodeId: image.nodeId,
            filename: image.filename,
          });
        }

        let exportedByLocalId = new Map();
        if (exportTasks.length) {
          try {
            const exportResult = await requestExportImages(exportTasks, group.offerId);
            const exported = Array.isArray(exportResult?.images) ? exportResult.images : [];
            const exportErrors = Array.isArray(exportResult?.errors) ? exportResult.errors : [];
            exportedByLocalId = new Map(exported.map((entry) => [entry.localId, entry]));
            if (exportErrors.length) {
              appendWarnings(exportErrors.map((error) => `Export: ${String(error)}`));
              renderWarnings();
            }
            logEvent("export", "Экспорт из Figma завершен", {
              offerId: group.offerId,
              requested: exportTasks.length,
              received: exported.length,
              errors: exportErrors.length,
            });
          } catch (error) {
            appendWarnings([`Экспорт через code.js не удался: ${String(error.message || error)}`]);
            renderWarnings();
            logEvent("export", "Экспорт из Figma завершился ошибкой", {
              offerId: group.offerId,
              error: String(error.message || error),
            }, "error");
          }
        }

        const payloadItems = [];

        for (const item of group.items) {
          if (item.kind === "existing") {
            payloadItems.push({ kind: "existing", url: item.url });
            continue;
          }

          const image = group.newImages.get(item.newImageId);
          if (!image) {
            continue;
          }

          const exported = exportedByLocalId.get(item.newImageId);
          if (exported && exported.contentBase64) {
            payloadItems.push({
              kind: "new",
              image: {
                id: item.newImageId,
                filename: exported.filename || image.filename,
                mime_type: exported.mimeType || image.mimeType || "image/png",
                content_base64: exported.contentBase64,
              },
            });
            continue;
          }

          if (image.inlineBase64) {
            payloadItems.push({
              kind: "new",
              image: {
                id: item.newImageId,
                filename: image.filename,
                mime_type: image.mimeType || "image/png",
                content_base64: image.inlineBase64,
              },
            });
            continue;
          }

          throw new Error(`Не удалось экспортировать изображение из Figma: ${image.sourceName}`);
        }

        logEvent("payload", "Подготовлен payload для sync", {
          offerId: group.offerId,
          totalItems: payloadItems.length,
        });
        return payloadItems;
      }

      async function syncGroup(offerId) {
        const group = state.groups.get(offerId);
        if (!group || group.loadingLookup || group.loadingSync) {
          return;
        }

        const syncStartedAt = Date.now();

        if (!group.items.length) {
          group.resultMessage = "Список изображений пуст";
          group.status = "warn";
          render();
          return;
        }

        group.loadingSync = true;
        group.status = "loading";
        group.resultMessage = "Подготавливаем изображения и отправляем в Ozon...";
        logEvent("sync", "Старт синхронизации", { offerId, items: group.items.length });
        render();

        try {
          const payloadItems = await buildPayloadItems(group);
          if (!payloadItems.length) {
            throw new Error("После подготовки нет изображений для отправки");
          }

          const response = await apiRequest("/api/products/sync-pictures", {
            offer_id: offerId,
            product_id: group.product ? group.product.product_id : null,
            unarchive_if_needed: false,
            wait_import_status: Boolean(state.waitImportStatus),
            verify_apply: Boolean(state.verifyApply),
            items: payloadItems,
          });

          const applyCheck = response.apply_check || null;
          const baseLogDetails = {
            offerId,
            productId: group.product ? group.product.product_id : null,
            finalCount: (response.final_urls || []).length,
            uploadedCount: (response.uploaded_urls || []).length,
            waitImportStatus: Boolean(state.waitImportStatus),
            verifyApply: Boolean(state.verifyApply),
            startedAt: new Date(syncStartedAt).toISOString(),
            finishedAt: new Date().toISOString(),
            elapsedMs: Date.now() - syncStartedAt,
            timingsMs: response.timings_ms || null,
            applyCheck: applyCheck || null,
          };

          if (applyCheck && applyCheck.checked && applyCheck.matched === false) {
            group.resultMessage = "Фото отправлены с предупреждением. Детали в Логи.";
            group.status = "warn";
            addGroupLog(group, "Отправка с предупреждением", baseLogDetails);
            logEvent(
              "sync",
              "Синхронизация завершилась с предупреждением apply_check",
              {
                ...baseLogDetails,
              },
              "warn"
            );
          } else {
            group.resultMessage = "Фото отправлены в Ozon. Подробности в Логи.";
            group.status = "synced";
            addGroupLog(group, "Отправка выполнена успешно", baseLogDetails);
            logEvent("sync", "Синхронизация завершена успешно", {
              ...baseLogDetails,
            });
          }

          notify(`Фото для ${offerId} отправлены в Ozon`);
        } catch (error) {
          const errorText = String(error.message || error);
          group.resultMessage = "Ошибка синхронизации. Детали в Логи.";
          group.status = "err";
          addGroupLog(group, "Ошибка синхронизации", {
            offerId,
            error: errorText,
            startedAt: new Date(syncStartedAt).toISOString(),
            finishedAt: new Date().toISOString(),
            elapsedMs: Date.now() - syncStartedAt,
          });
          logEvent("sync", "Ошибка синхронизации", { offerId, error: errorText }, "error");
          notify(group.resultMessage, true);
        } finally {
          group.loadingSync = false;
          state.progress.exportRunning = false;
          state.progress.exportRequestId = "";
          render();
        }
      }

      async function syncAllGroups() {
        const groups = [...state.groups.keys()];
        state.progress.bulkSyncRunning = true;
        state.progress.bulkSyncTotal = groups.length;
        state.progress.bulkSyncDone = 0;
        state.progress.bulkSyncOfferId = "";
        render();

        if (!groups.length) {
          state.progress.bulkSyncRunning = false;
          render();
          return;
        }

        for (const offerId of groups) {
          state.progress.bulkSyncOfferId = offerId;
          renderProgress();
          await syncGroup(offerId);
          state.progress.bulkSyncDone += 1;
          renderProgress();
        }

        state.progress.bulkSyncRunning = false;
        state.progress.bulkSyncOfferId = "";
        render();
      }

      function moveItem(offerId, index, delta) {
        const group = state.groups.get(offerId);
        if (!group) {
          return;
        }

        const target = index + delta;
        if (target < 0 || target >= group.items.length) {
          return;
        }

        const cloned = [...group.items];
        const [item] = cloned.splice(index, 1);
        cloned.splice(target, 0, item);
        group.items = cloned;
        render();
      }

      function reorderByDrag(offerId, fromIndex, toIndex) {
        const group = state.groups.get(offerId);
        if (!group) {
          return;
        }

        if (fromIndex === toIndex || fromIndex < 0 || toIndex < 0) {
          return;
        }

        const cloned = [...group.items];
        const [item] = cloned.splice(fromIndex, 1);
        cloned.splice(toIndex, 0, item);
        group.items = cloned;
        render();
      }

      function removeItem(offerId, index) {
        const group = state.groups.get(offerId);
        if (!group) {
          return;
        }

        group.items = group.items.filter((_, currentIndex) => currentIndex !== index);
        render();
      }

      function removeExistingItems(offerId) {
        const group = state.groups.get(offerId);
        if (!group) {
          return;
        }
        const before = group.items.length;
        group.items = group.items.filter((item) => item.kind !== "existing");
        const removed = before - group.items.length;
        logEvent("ui", "Удалены текущие фото из списка", { offerId, removed });
        render();
      }

      function removeExistingItemsForAllGroups() {
        let removedTotal = 0;
        let affectedGroups = 0;

        for (const group of state.groups.values()) {
          const before = group.items.length;
          group.items = group.items.filter((item) => item.kind !== "existing");
          const removed = before - group.items.length;
          if (removed > 0) {
            removedTotal += removed;
            affectedGroups += 1;
          }
        }

        if (removedTotal === 0) {
          logEvent("ui", "Глобальное удаление текущих фото: ничего не удалено");
          notify("Текущих фото для удаления не найдено");
          return;
        }

        logEvent("ui", "Удалены все текущие фото", { removedTotal, affectedGroups });
        notify(`Удалены текущие фото: ${removedTotal}`);
        render();
      }

      function removeGroupFromWork(offerId) {
        const group = state.groups.get(offerId);
        if (!group) {
          return;
        }

        const invalidNameWarnings = new Set();
        for (const image of group.newImages.values()) {
          const sourceName = String(image?.sourceName || "").trim();
          if (!sourceName) {
            continue;
          }
          invalidNameWarnings.add(
            `Имя "${sourceName}" не в формате offer_id_номер. Порядок взят из выделения.`
          );
        }

        if (invalidNameWarnings.size) {
          const before = state.warnings.length;
          state.warnings = state.warnings.filter((message) => !invalidNameWarnings.has(String(message)));
          const removedWarnings = before - state.warnings.length;
          if (removedWarnings > 0) {
            logEvent("ui", "Удалены предупреждения для удаленного товара", {
              offerId,
              removedWarnings,
            });
          }
        }

        for (const image of group.newImages.values()) {
          state.newImagePreviews.delete(image.localId);
        }

        state.groups.delete(offerId);
        logEvent("ui", "Товар удален из работы", { offerId });
        render();
      }

      function itemPreview(group, item) {
        if (item.kind === "existing") {
          return makeProxyUrl(item.url);
        }
        const preview = state.newImagePreviews.get(item.newImageId);
        return preview || NEW_IMAGE_PLACEHOLDER;
      }

      function statusBadge(group) {
        if (group.loadingLookup || group.loadingSync) {
          return `<span class="status">В работе</span>`;
        }
        if (group.status === "synced") {
          return `<span class="status">Отправлено</span>`;
        }
        if (group.status === "found") {
          return `<span class="status">Готово к отправке</span>`;
        }
        if (group.status === "warn") {
          return `<span class="status warn">Требует внимания</span>`;
        }
        if (group.status === "lookup-error") {
          return `<span class="status lookup-error">Ошибка поиска</span>`;
        }
        if (group.status === "not-found") {
          return `<span class="status not-found">Не найден</span>`;
        }
        if (group.status === "err") {
          return `<span class="status err">Ошибка</span>`;
        }
        return `<span class="status">Черновик</span>`;
      }

      function formatGroupLogsText(group) {
        const logs = Array.isArray(group?.logs) ? group.logs : [];
        if (!logs.length) {
          return "Логов пока нет.";
        }

        return logs
          .map((entry, index) => {
            const timestamp = new Date(entry.at || Date.now()).toLocaleString("ru-RU");
            const summary = String(entry.summary || "Событие");
            const details = entry.details && typeof entry.details === "object" ? entry.details : {};
            return `${index + 1}. ${timestamp} | ${summary}\n${JSON.stringify(details, null, 2)}`;
          })
          .join("\n\n");
      }

      function renderWarnings() {
        const box = document.getElementById("warnings");
        if (!state.warnings.length) {
          box.innerHTML = "";
          return;
        }
        box.innerHTML = `<div class="warnings">${escapeHtml(state.warnings.join("\n"))}</div>`;
      }

      function appendWarnings(messages) {
        let changed = false;
        for (const message of messages || []) {
          const normalized = String(message || "").trim();
          if (!normalized) {
            continue;
          }
          if (state.warnings.includes(normalized)) {
            continue;
          }
          state.warnings.push(normalized);
          changed = true;
        }
        return changed;
      }

      function renderSummary() {
        const groups = [...state.groups.values()];
        const totalGroups = groups.length;
        const totalItems = groups.reduce((acc, group) => acc + group.items.length, 0);
        const loadedProducts = groups.filter((group) => Boolean(group.product)).length;

        document.getElementById("summary").innerHTML = `
          <div class="pill">
            <div class="pill-value">${totalGroups}</div>
            <div class="pill-label">Товаров в выборке</div>
          </div>
          <div class="pill">
            <div class="pill-value">${totalItems}</div>
            <div class="pill-label">Фото в списках</div>
          </div>
          <div class="pill">
            <div class="pill-value">${loadedProducts}</div>
            <div class="pill-label">Найдено в Ozon</div>
          </div>
        `;
      }

      function renderProgress() {
        const container = document.getElementById("progress");
        let text = "Готово к выгрузке";
        let percent = 0;
        let details = "";
        let fillClass = "";
        let showBar = false;

        const bulkSyncCompleted =
          state.progress.bulkSyncTotal > 0 &&
          state.progress.bulkSyncDone >= state.progress.bulkSyncTotal &&
          !state.progress.bulkSyncRunning;

        if (state.progress.bulkSyncRunning) {
          const total = Math.max(1, state.progress.bulkSyncTotal);
          const done = Math.min(total, state.progress.bulkSyncDone);
          percent = Math.round((done / total) * 100);
          text = `Массовая отправка в Ozon: ${done}/${total}`;
          showBar = true;
          if (state.progress.bulkSyncOfferId) {
            details = `Текущий артикул: ${state.progress.bulkSyncOfferId}`;
          }
        } else if (state.progress.previewRunning) {
          const total = Math.max(1, state.progress.previewTotal);
          const done = Math.min(total, state.progress.previewDone);
          percent = Math.round((done / total) * 100);
          text = `Генерация мини-превью новых изображений: ${done}/${total}`;
          showBar = true;
        } else if (state.progress.exportRunning) {
          const total = Math.max(1, state.progress.exportTotal);
          const done = Math.min(total, state.progress.exportDone);
          percent = Math.round((done / total) * 100);
          text = `Экспорт изображений из Figma для ${state.progress.exportOfferId}: ${done}/${total}`;
          showBar = true;
        } else if (state.progress.lookupRunning) {
          const total = Math.max(1, state.progress.lookupTotal);
          const done = Math.min(total, state.progress.lookupDone);
          percent = Math.round((done / total) * 100);
          text = `Автопоиск товаров в Ozon: ${done}/${total}`;
          showBar = true;
        } else if (bulkSyncCompleted) {
          const total = state.progress.bulkSyncTotal;
          percent = 100;
          text = `Массовая отправка завершена: ${total}/${total}`;
          fillClass = " success";
          showBar = true;
        }

        container.innerHTML = `
          <div class="progress${showBar ? "" : " progress-idle"}">
            <div class="progress-text">${escapeHtml(text)}</div>
            ${showBar ? `${details ? `<div class="meta">${escapeHtml(details)}</div>` : ""}` : ""}
            ${showBar ? `<div class="progress-bar"><div class="progress-fill${fillClass}" style="width:${percent}%"></div></div>` : ""}
          </div>
        `;
      }

      function renderGroups() {
        const container = document.getElementById("groups");
        const groups = [...state.groups.values()].sort((a, b) => a.offerId.localeCompare(b.offerId, "ru"));

        if (!groups.length) {
          container.innerHTML = `<div class="empty">Нет данных. Выделите изображения в Figma и нажмите «Обновить выделение».</div>`;
          return;
        }

        container.innerHTML = groups
          .map((group) => {
            const isNotFound = group.status === "not-found";
            const isLookupError = isNotFound || group.status === "lookup-error";
            const isSynced = group.status === "synced";
            const productName = group.product
              ? group.product.product_name || "Без названия"
              : isNotFound
              ? "Товар не найден"
              : isLookupError
              ? "Ошибка поиска товара"
              : "Поиск товара...";
            const existingCount = group.items.filter((item) => item.kind === "existing").length;
            const newCount = group.items.filter((item) => item.kind === "new").length;
            const cardClass = [
              "group-card",
              isLookupError ? "lookup-error" : "",
              isNotFound ? "not-found" : "",
              isSynced ? "synced-success" : "",
            ]
              .filter(Boolean)
              .join(" ");
            const resultClass = isLookupError ? "result result-error" : "result";
            const logsText = formatGroupLogsText(group);

            const itemsMarkup = group.items
              .map((item, index) => {
                const preview = itemPreview(group, item);
                const image = item.kind === "new" ? group.newImages.get(item.newImageId) : null;
                const frameName =
                  item.kind === "new" ? image?.sourceName || image?.filename || "без имени" : "Фото из Ozon";
                const typeClass = item.kind === "new" ? "new" : "existing";
                const typeLabel = item.kind === "new" ? "НОВОЕ" : "ТЕКУЩЕЕ";

                return `
                  <div class="item" draggable="true" data-drag-item="1" data-offer="${escapeHtml(group.offerId)}" data-index="${index}">
                    <img class="thumb" src="${escapeHtml(preview)}" alt="preview" loading="lazy" />
                    <div class="item-body">
                      <div class="item-topline">
                        <span class="item-top-left">
                          <span class="item-order">#${index + 1}</span>
                          <span class="drag-handle" title="Перетаскивайте мышкой">⋮⋮</span>
                        </span>
                        <span class="item-type ${typeClass}">${typeLabel}</span>
                      </div>
                      <div class="item-title" title="${escapeHtml(frameName)}">${escapeHtml(frameName)}</div>
                    </div>
                    <div class="item-actions">
                      <button
                        data-action="prev"
                        data-offer="${escapeHtml(group.offerId)}"
                        data-index="${index}"
                        title="Раньше в порядке"
                        ${index === 0 ? "disabled" : ""}
                      >
                        ←
                      </button>
                      <button
                        data-action="next"
                        data-offer="${escapeHtml(group.offerId)}"
                        data-index="${index}"
                        title="Позже в порядке"
                        ${index === group.items.length - 1 ? "disabled" : ""}
                      >
                        →
                      </button>
                      <button data-action="remove" data-offer="${escapeHtml(group.offerId)}" data-index="${index}" title="Удалить">✕</button>
                    </div>
                  </div>
                `;
              })
              .join("");

            return `
              <section class="${cardClass}">
                <div class="group-head">
                  <div>
                    <div class="product-name">${escapeHtml(productName)}</div>
                    <div class="offer-id">${escapeHtml(`Артикул: ${group.offerId}`)}</div>
                  </div>
                  ${statusBadge(group)}
                </div>

                <div class="group-body">
                  <div class="group-actions">
                    <button
                      class="outline"
                      data-action="lookup"
                      data-offer="${escapeHtml(group.offerId)}"
                      ${group.loadingLookup || group.loadingSync ? "disabled" : ""}
                    >
                      ${group.loadingLookup ? "Поиск..." : "Обновить товар"}
                    </button>
                    <button
                      class="outline"
                      data-action="remove-existing"
                      data-offer="${escapeHtml(group.offerId)}"
                      ${group.loadingLookup || group.loadingSync ? "disabled" : ""}
                    >
                      Удалить текущие фото
                    </button>
                    ${
                      isLookupError
                        ? `<button
                      class="danger"
                      data-action="remove-group"
                      data-offer="${escapeHtml(group.offerId)}"
                      ${group.loadingLookup || group.loadingSync ? "disabled" : ""}
                    >
                      Убрать из работы
                    </button>`
                        : ""
                    }
                    ${
                      isLookupError
                        ? ""
                        : `<button
                      class="primary"
                      data-action="sync"
                      data-offer="${escapeHtml(group.offerId)}"
                      ${group.loadingLookup || group.loadingSync ? "disabled" : ""}
                    >
                      ${group.loadingSync ? "Отправка..." : "Отправить"}
                    </button>`
                    }
                  </div>

                  <div class="product-line">
                    <div>
                      <div>${escapeHtml(`Товар: ${productName}`)}</div>
                      <div class="meta">${escapeHtml(`Текущих: ${existingCount} | Новых: ${newCount}`)}</div>
                    </div>
                    ${
                      isSynced
                        ? '<span class="tag">Фото отправлены</span>'
                        : group.product
                        ? '<span class="tag">Найден в Ozon</span>'
                        : '<span class="meta">Ожидание данных</span>'
                    }
                  </div>

                  <div class="items">${itemsMarkup || `<div class="empty">Нет изображений в этом наборе</div>`}</div>

                  <div class="${resultClass}">${escapeHtml(group.resultMessage || "Настройте порядок фото и нажмите «Отправить».")}</div>
                  <details class="group-logs">
                    <summary>Логи</summary>
                    <pre class="group-logs-text">${escapeHtml(logsText)}</pre>
                  </details>
                </div>
              </section>
            `;
          })
          .join("");
      }

      function render() {
        renderSummary();
        renderProgress();
        renderWarnings();
        renderGroups();
        renderDebugLog();
      }

      document.getElementById("toggle-settings").addEventListener("click", () => {
        const panel = document.getElementById("settings-panel");
        const opened = panel.classList.toggle("open");
        logEvent("ui", opened ? "Открыты настройки" : "Скрыты настройки");
      });

      document.getElementById("backend-url").addEventListener("input", (event) => {
        state.backendUrl = event.target.value;
      });

      const newImagesAtStartToggle = document.getElementById("new-images-at-start");
      const newImagesPositionLabel = document.getElementById("new-images-position-label");

      function updateNewImagesPositionLabel() {
        if (!newImagesPositionLabel) {
          return;
        }
        newImagesPositionLabel.textContent =
          state.newImagesPosition === "start" ? "Добавлять в начало" : "Добавлять в конец";
      }

      if (newImagesAtStartToggle) {
        newImagesAtStartToggle.checked = state.newImagesPosition === "start";
        updateNewImagesPositionLabel();

        newImagesAtStartToggle.addEventListener("change", (event) => {
          state.newImagesPosition = event.target.checked ? "start" : "end";
          updateNewImagesPositionLabel();
          applyNewImagesPositionToAllGroups();
          logEvent("settings", "Изменен порядок новых фото по умолчанию", { value: state.newImagesPosition });
        });
      } else {
        updateNewImagesPositionLabel();
      }

      document.getElementById("reload-selection").addEventListener("click", () => {
        requestSelection();
      });

      document.getElementById("lookup-all").addEventListener("click", async () => {
        await lookupAllGroups();
      });

      document.getElementById("remove-all-existing").addEventListener("click", () => {
        removeExistingItemsForAllGroups();
      });

      document.getElementById("sync-all").addEventListener("click", async () => {
        await syncAllGroups();
      });

      document.getElementById("wait-import-status").addEventListener("change", (event) => {
        state.waitImportStatus = Boolean(event.target.checked);
      });

      document.getElementById("verify-apply").addEventListener("change", (event) => {
        state.verifyApply = Boolean(event.target.checked);
      });

      document.getElementById("close-plugin").addEventListener("click", () => {
        closePlugin();
      });

      document.getElementById("copy-logs").addEventListener("click", async () => {
        const payload = state.debugLogs.join("\n");
        if (!payload) {
          return;
        }
        try {
          await navigator.clipboard.writeText(payload);
          notify("Логи скопированы");
        } catch (error) {
          appendWarnings([`Не удалось скопировать логи: ${String(error.message || error)}`]);
          renderWarnings();
        }
      });

      document.getElementById("clear-logs").addEventListener("click", () => {
        state.debugLogs = [];
        renderDebugLog();
      });

      document.getElementById("groups").addEventListener("click", (event) => {
        const target = event.target.closest("button[data-action]");
        if (!target) {
          return;
        }

        const action = target.dataset.action;
        const offer = target.dataset.offer;
        const index = Number(target.dataset.index);

        if (!offer || !action) {
          return;
        }

        if (action === "lookup") {
          lookupGroup(offer, { showSuccessToast: true, notifyErrors: true });
          return;
        }

        if (action === "sync") {
          syncGroup(offer);
          return;
        }

        if (action === "prev") {
          moveItem(offer, index, -1);
          return;
        }

        if (action === "next") {
          moveItem(offer, index, 1);
          return;
        }

        if (action === "remove") {
          removeItem(offer, index);
          return;
        }

        if (action === "remove-existing") {
          removeExistingItems(offer);
          return;
        }

        if (action === "remove-group") {
          removeGroupFromWork(offer);
        }
      });

      document.getElementById("groups").addEventListener("dragstart", (event) => {
        const item = event.target.closest("[data-drag-item='1']");
        if (!item) {
          return;
        }

        const offer = item.dataset.offer;
        const index = Number(item.dataset.index);
        if (!offer || Number.isNaN(index)) {
          return;
        }

        state.dragState = { offer, index };
        item.classList.add("dragging");
        event.dataTransfer.effectAllowed = "move";
        event.dataTransfer.setData("text/plain", `${offer}:${index}`);
      });

      document.getElementById("groups").addEventListener("dragend", (event) => {
        const item = event.target.closest("[data-drag-item='1']");
        if (item) {
          item.classList.remove("dragging");
        }
        state.dragState = null;
        document.querySelectorAll(".item.drop-target").forEach((el) => el.classList.remove("drop-target"));
      });

      document.getElementById("groups").addEventListener("dragover", (event) => {
        const target = event.target.closest("[data-drag-item='1']");
        if (!target || !state.dragState) {
          return;
        }

        if (target.dataset.offer !== state.dragState.offer) {
          return;
        }

        event.preventDefault();
        target.classList.add("drop-target");
        event.dataTransfer.dropEffect = "move";
      });

      document.getElementById("groups").addEventListener("dragleave", (event) => {
        const target = event.target.closest("[data-drag-item='1']");
        if (!target) {
          return;
        }
        target.classList.remove("drop-target");
      });

      document.getElementById("groups").addEventListener("drop", (event) => {
        const target = event.target.closest("[data-drag-item='1']");
        if (!target || !state.dragState) {
          return;
        }

        const offer = target.dataset.offer;
        const toIndex = Number(target.dataset.index);
        if (!offer || Number.isNaN(toIndex) || offer !== state.dragState.offer) {
          return;
        }

        event.preventDefault();
        reorderByDrag(offer, state.dragState.index, toIndex);
      });

      onmessage = (event) => {
        const message = event.data && event.data.pluginMessage;
        if (!message) {
          return;
        }

        if (message.type === "plugin-log") {
          logEvent(
            `code:${String(message.stage || "plugin")}`,
            String(message.message || ""),
            message.meta ?? null,
            String(message.level || "info").toLowerCase()
          );
          return;
        }

        if (message.type === "selection-data") {
          hydrateFromSelection(message.images || [], message.warnings || []);
          return;
        }

        if (message.type === "preview-progress") {
          const pending = pendingPreviewRequests.get(message.requestId);
          if (pending) {
            armPendingTimeout(pendingPreviewRequests, message.requestId);
          }
          if (state.progress.previewRequestId === message.requestId) {
            state.progress.previewDone = Number(message.done) || 0;
            state.progress.previewTotal = Number(message.total) || state.progress.previewTotal;
            renderProgress();
          }
          return;
        }

        if (message.type === "preview-chunk") {
          const pending = pendingPreviewRequests.get(message.requestId);
          if (!pending) {
            return;
          }
          armPendingTimeout(pendingPreviewRequests, message.requestId);

          const previews = Array.isArray(message.previews) ? message.previews : [];
          const errors = Array.isArray(message.errors) ? message.errors : [];

          for (const preview of previews) {
            if (!preview || typeof preview.localId !== "string") {
              continue;
            }
            if (typeof preview.dataUrl !== "string" || !preview.dataUrl) {
              continue;
            }
            pending.previews.push(preview);
            state.newImagePreviews.set(preview.localId, preview.dataUrl);
          }

          if (errors.length) {
            pending.errors.push(...errors);
          }
          render();
          return;
        }

        if (message.type === "preview-result") {
          const pending = pendingPreviewRequests.get(message.requestId);
          if (!pending) {
            return;
          }

          pendingPreviewRequests.delete(message.requestId);
          clearTimeout(pending.timeout);

          const previews = Array.isArray(message.previews) ? message.previews : [];
          const errors = Array.isArray(message.errors) ? message.errors : [];
          if (previews.length) {
            pending.previews.push(...previews);
          }
          if (errors.length) {
            pending.errors.push(...errors);
          }

          pending.resolve({
            previews: pending.previews,
            errors: pending.errors,
          });
          return;
        }

        if (message.type === "export-images-progress") {
          const pending = pendingExportRequests.get(message.requestId);
          if (pending) {
            armPendingTimeout(pendingExportRequests, message.requestId);
          }
          if (state.progress.exportRequestId === message.requestId) {
            state.progress.exportDone = Number(message.done) || 0;
            state.progress.exportTotal = Number(message.total) || state.progress.exportTotal;
            renderProgress();
          }
          return;
        }

        if (message.type === "export-image-chunk") {
          const pending = pendingExportRequests.get(message.requestId);
          if (!pending) {
            return;
          }
          armPendingTimeout(pendingExportRequests, message.requestId);

          const images = Array.isArray(message.images) ? message.images : [];
          const errors = Array.isArray(message.errors) ? message.errors : [];
          if (images.length) {
            pending.images.push(...images);
          }
          if (errors.length) {
            pending.errors.push(...errors);
          }
          return;
        }

        if (message.type === "export-images-result") {
          const pending = pendingExportRequests.get(message.requestId);
          if (!pending) {
            return;
          }

          pendingExportRequests.delete(message.requestId);
          clearTimeout(pending.timeout);

          state.progress.exportRunning = false;
          state.progress.exportRequestId = "";
          render();

          const images = Array.isArray(message.images) ? message.images : [];
          const errors = Array.isArray(message.errors) ? message.errors : [];
          if (images.length) {
            pending.images.push(...images);
          }
          if (errors.length) {
            pending.errors.push(...errors);
          }

          pending.resolve({
            images: pending.images,
            errors: pending.errors,
          });
        }
      };

      logEvent("plugin", "UI инициализирован");
      requestSelection();
      render();
    </script>
  </body>
</html>
